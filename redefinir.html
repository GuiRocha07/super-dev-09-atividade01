<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir</title>
    <link rel="stylesheet" href="assets/css/redefinir.css">
</head>
<body>
    <form action="login.html" class="tabela">
        <div class="redefinir">
            <h1>Redefinir Senha</h1>
        </div>
        <div class="campo">
        <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite seu EMAIL" required>
        </div>
        <div class="campo">
            <label for="confirmarEmail">Confirmar Email</label>
        <input type="email" id="confirmarEmail" placeholder="Digite seu EMAIL" required>
        </div>
        <div class="campo">
            <label for="cpf">Cpf</label>
            <input type="text" id="cpf" name="cpf" pattern="[0-9]{11}" placeholder="Somente números" required>
        </div>
        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" pattern="(?=.*[A-Za-z])(?=.*[0-9]).{8,}"
            placeholder="Digite sua senha" required>
        </div>
        <div class="campo">
            <label for="senha">Confirmar senha</label>
            <input type="password" id="confirmarSenha" name="confirmarSenha" pattern="(?=.*[A-Za-z])(?=.*[0-9]).{8,}"
            placeholder="Repita sua senha" required>
        </div>
        <div class="link">
            <button type="submit" class="link-1">Confirmar</button>
        </div>
        <div class="voltar">
            <a href="login.html">Voltar para login</a>
        </div>
    </form>
</body>
</html>
