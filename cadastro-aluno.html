<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/cadastro-aluno.css">
    <title>Cadastro Aluno</title>
</head>
<body>
    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="alunos.html">Alunos</a>
        <a href="treinos.html">Treinos</a>
        <a href="cadastro-treino.html">Cadastro de Treino</a>
        <a href="planos.html">Planos</a>
        <a href="cadastro-plano.html">Cadastro de Plano</a>
    </nav>
    <form class="formulario">
        <h1>Cadastro</h1>

        <div class = nome>
        <label for="name" class="cadastro">Nome Completo</label>
        <input type="text" class="campo-resposta" name="nome" placeholder="Carlos Erick Thiago da Paz" required>
        </div>

        <div>
        <label for="cadastro-pessoa-fisica" class="cadastro">CPF</label>
        <input type="tel" class="campo-resposta" name="cadastro-pessoa-fisica" pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}-[0-9]{2}" placeholder="476-209-175-86"required>
        <!-- o tel foi usado, pois o number não suporta pattern -->
        </div>

        <div>
        <label for="data-nascimento" class="cadastro">Data de Nascimento</label>
        <input type="date" class="campo-resposta" name="data-nascimento" max="2026-03-30" required>
        <!-- O HTML ñ é capaz de calcular a data atual, ele ñ inteligente por si só, para automatizar isso é necessárrio JS -->
        </div>

        <div>
        <label for="telefone" class="cadastro">Telefone</label>
        <input type="tel" class="campo-resposta" name="telefone" pattern="[0-9]{2}-[0-9]{5}-[0-9]{4}" placeholder="47-92794-2054" required>
        </div>

        <div>
        <label for="endereco-eletronico" class="cadastro">Email</label>
        <input type="email" class="campo-resposta" name="endereco-eletronico" placeholder="carloserickdapaz@gmail.com." required>
        </div>

        <div>
        <label for="peso" class="cadastro">Peso</label>
        <input type="number" class="campo-resposta" name="peso" placeholder="62,7 kg" required>
        </div>

        <div>
        <label for="altura" class="cadastro">Altura</label>
        <input type="number" class="campo-resposta" name="altura" placeholder="1,81 m" required>
        </div>

        <h4>Sexo<h4>
        <div class="sexo">
            <input type="radio" id="masc" name="sexo" value="Masculino">
            <label for="masc">Masculino</label>
            <input type="radio" id="fem" name="sexo" value="Feminino">
            <label for="fem">Feminino</label>
        </div>

        <div class="botoes">
        <button type="submit" class="botao">Enviar</button>
        <button type="reset" class="botao">Limpar</button>
        </div>
    </form>

</body>
</html>
