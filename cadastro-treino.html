<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Treino</title>
    <link rel="stylesheet" href="assets/css/cadastro-treino.css">
</head>
<body>

    <h1>Cadastro de Treino</h1>

    <form>

        <label>Nome do treino:</label><br>
        <input type="text" name="nome"><br><br>

        <label>Data:</label><br>
        <input type="date" name="data"><br><br>

        <label>Intensidade:</label><br>
        <input type="radio" name="intensidade" value="leve"> Leve<br>
        <input type="radio" name="intensidade" value="medio"> Médio<br>
        <input type="radio" name="intensidade" value="pesado"> Pesado<br><br>

        <label>Observações:</label><br>
        <textarea name="obs" rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Cadastrar">

    </form>

    <br>
    <a href="treinos.html">Voltar</a>

</body>
</html>
