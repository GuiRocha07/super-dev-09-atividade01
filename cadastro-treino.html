<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Treino</title>
    <link rel="stylesheet" href="assets/css/cadastro-treino.css">
</head>
<body>
    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="alunos.html">Alunos</a>
        <a href="cadastro-aluno.html">Cadastro de Aluno</a>
        <a href="treinos.html">Treinos</a>
        <a href="cadastro-treino.html">Cadastro de Treino</a>
        <a href="planos.html">Planos</a>
    </nav>
    <div>
        <form action="treinos.html" class="tabela">
            <div class="treino">
                <h1>Cadastro de Treino</h1>
            </div>
            <div class="aluno">
                <label>Nome do aluno:</label>
                <input type="text" name="nome" required>
            </div>
            <div class="nome">
                <label>Nome do treino:</label>
                <input type="text" name="nome" required>
            </div>
            <div class="data">
                <label>Data:</label>
                <input type="date" name="data" required></input>
            </div>
            <div class="intensidade">
                <label>Intensidade:</label>
                <input type="radio" name="intensidade" value="leve" required>Leve
                <input type="radio" name="intensidade" value="medio">Médio
                <input type="radio" name="intensidade" value="pesado">Pesado 
            </div>
            <div class="observacao" required>
                <label>Observações:</label>
                <textarea name="obs" rows="4" cols="30" required></textarea>
            </div>
            <div class="add">
            <a href="treinos.html">Adcionar Treino</a>
          </div>
        </form>
    </div>
</body>
</html>
