<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
        <form action="index.html" class="tabela">
            <div class="login">
                <h1>Login</h1>
            </div>
            <div class="campo1">
                <label for="email"></label>
                <input type="email" id="email" name="email" placeholder="Usuário" required>
            </div>
            <div class="campo2">
                <label for="senha"></label>
                <input type="password" id="senha" name="senha" pattern=".{8,}" placeholder="Senha" required>
            </div>
            <div>
                <button class="botao-estilo">Entrar</button>
            </div>
            <div class="esqueci">
                <a href="redefinir.html">Esqueci minha senha</a>
            </div>
            </form>
            
</body>
</html>
